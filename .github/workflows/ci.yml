name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            sidecar/requirements.txt
            sidecar/requirements-dev.txt

      - name: System packages for sounddevice
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev libportaudio2

      - name: Install Python deps
        run: |
          python -m venv sidecar/.venv
          sidecar/.venv/bin/pip install --upgrade pip
          sidecar/.venv/bin/pip install -r sidecar/requirements.txt
          sidecar/.venv/bin/pip install -r sidecar/requirements-dev.txt

      - name: Syntax check
        run: sidecar/.venv/bin/python -m compileall -q sidecar

      - name: pytest
        run: sidecar/.venv/bin/pytest sidecar/tests

  frontend:
    name: Frontend (TypeScript + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: voice-app/package-lock.json

      - name: Install
        run: cd voice-app && npm ci

      - name: Type-check
        run: cd voice-app && npx tsc --noEmit

      - name: Build
        run: cd voice-app && npm run build
