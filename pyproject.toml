[tool.pytest.ini_options]
# The sidecar runs from sidecar/ with `app` as the top-level package
# (see sidecar/run.py). Mirror that for tests so production imports work
# unmodified.
pythonpath = ["sidecar"]
testpaths = ["sidecar/tests"]
addopts = "-q --tb=short"

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["sidecar", "tools"]
exclude = [
  "sidecar/.venv",
]

[tool.ruff.lint]
select = ["E7", "E9", "F"]
